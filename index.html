            color: var(--text-color);

        }

        .navbar {

            color: white;
            padding: 1rem;
            text-align: center;

        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .category-btn {
            background: white;
            border: 2px solid var(--primary-color);
            padding: 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .category-btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-5px);
        }

        .flashcard {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            min-height: 300px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin: 2rem 0;
        }

        .card-term {
            font-size: 2rem;
            text-align: center;
            margin: 2rem 0;
            color: var(--primary-color);
        }

        .card-explanation, .card-example {
            display: none;
            margin: 1rem 0;
        }

        .card-explanation.show, .card-example.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
        }

        .btn {
            flex: 1;
            padding: 1rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none;
        }

        .stats {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
            text-align: center;

</head>

let sessionStats = {
    totalAnswered: 0,
    correctAnswers: 0,
    wrongAnswers: 0,
    lastSessionDate: new Date().toLocaleDateString()
};

// Lokale Speicherung
function saveToLocalStorage() {
    localStorage.setItem('flashcards', JSON.stringify(flashcards));
    localStorage.setItem('sessionStats', JSON.stringify(sessionStats));
}

function loadFromLocalStorage() {
    const savedCards = localStorage.getItem('flashcards');
    const savedStats = localStorage.getItem('sessionStats');
    
    if (savedCards) {
        const loadedCards = JSON.parse(savedCards);
        flashcards.forEach((card, index) => {
            if (loadedCards[index]) {
                card.box = loadedCards[index].box;
                card.correctCount = loadedCards[index].correctCount;
            }
        });
    }
    
    if (savedStats) {
        sessionStats = JSON.parse(savedStats);
    }
}

// Bei Seitenladung Daten laden
window.addEventListener('load', loadFromLocalStorage);
        ];

        let currentCategory = 'alle';
        let currentCards = [];
        let currentIndex = 0;
        let correctAnswers = 0;
        let wrongAnswers = 0;

        function startLearning(category) {
            currentCategory = category;
            currentCards = category === 'alle' 
                ? [...flashcards]
                : flashcards.filter(card => card.categories.includes(category));
            
            // Zufällige Reihenfolge
            currentCards.sort(() => Math.random() - 0.5);
            
            currentIndex = 0;
            correctAnswers = 0;
            wrongAnswers = 0;
            
            document.getElementById('categoryScreen').classList.add('hidden');
            document.getElementById('cardScreen').classList.remove('hidden');
            
            showCard();
        }

        function showCard() {
            if (currentIndex >= currentCards.length) {
                alert(`Fertig! Richtig: ${correctAnswers}, Falsch: ${wrongAnswers}`);
                backToCategories();
                return;
            }

            const card = currentCards[currentIndex];
            document.getElementById('cardTerm').textContent = card.term;
            document.getElementById('cardExplanation').innerHTML = `<h3>Erklärung:</h3><p>${card.explanation}</p>`;
            document.getElementById('cardExample').innerHTML = `<h4>💡 Beispiel:</h4><p>${card.example}</p>`;
            
            // Erklärung verstecken
            document.getElementById('cardExplanation').classList.remove('show');
            document.getElementById('cardExample').classList.remove('show');
            
            updateStats();
        }

        function toggleExplanation() {
            document.getElementById('cardExplanation').classList.add('show');
            document.getElementById('cardExample').classList.add('show');
        }

        function markCorrect() {
            correctAnswers++;
            currentCards[currentIndex].correctCount++;
            
            // SM-2 Algorithmus vereinfacht
            if (currentCards[currentIndex].correctCount >= 4) {
                currentCards[currentIndex].box = Math.min(5, currentCards[currentIndex].box + 1);
            }
            
            currentIndex++;
            showCard();
        }

        function markWrong() {
            wrongAnswers++;
            currentCards[currentIndex].box = 1; // Zurück zu Box 1
            currentCards[currentIndex].correctCount = 0;
            currentIndex++;
            showCard();
        }

        function updateStats() {
            document.getElementById('progress').textContent = `${currentIndex + 1}/${currentCards.length}`;
            document.getElementById('correctCount').textContent = correctAnswers;
            document.getElementById('wrongCount').textContent = wrongAnswers;
        }

        function backToCategories() {
            document.getElementById('categoryScreen').classList.remove('hidden');
            document.getElementById('cardScreen').classList.add('hidden');
        }
    </script>
